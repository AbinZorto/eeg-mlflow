paths:
  source_root: "/home/abin/eeg-secondary-data"
  output_dir: "eeg_analysis/secondarydata/raw"

processing:
  target_sampling_rate: 256
  convert_to_microvolts: true
  keep_all_channels: true
  register_with_mlflow: true

# Optional MLflow overrides (tracking URI and experiment name)
mlflow:
  tracking_uri: "file:./mlruns"
  experiment_name: "eeg_processing"
