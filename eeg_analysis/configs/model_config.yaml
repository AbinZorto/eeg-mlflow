# EEG model configuration

# Data Configuration
data:
  feature_path: "eeg_analysis/data/processed/features/{window_size}s_{channels}_window_features.parquet"
  split:
    test_size: 0.2
    random_state: 42
    stratify: true

# Model configuration
model_type: "advanced_hybrid_1dcnn_lstm"

# Model grouping metadata (source of truth for orchestration/category logic)
model_families:
  traditional:
    - random_forest
    - gradient_boosting
    - svm_rbf
    - svm_linear
    - extra_trees
    - ada_boost
    - knn
    - decision_tree
  boosting:
    - xgboost_gpu
    - catboost_gpu
    - lightgbm_gpu
  deep_learning:
    - pytorch_mlp
    - hybrid_1dcnn_lstm
    - hybrid_1dcnn_lstm_gap
    - advanced_hybrid_1dcnn_lstm
    - advanced_hybrid_1dcnn_lstm_gap
    - efficient_tabular_mlp
    - advanced_lstm

# MLflow experiment group base names by family
experiment_groups:
  traditional: eeg_traditional_models
  boosting: eeg_boosting_gpu
  deep_learning: eeg_deep_learning_gpu
  other: eeg_other_models

model:
  name: "patient_model"
  # Class balancing options (choose only ONE):
  use_smote: false        # Oversampling technique - creates synthetic minority samples
  use_nearmiss: false    # Undersampling technique - removes majority samples (alternative to SMOTE)
  nearmiss_version: 1    # 1, 2, or 3 - different NearMiss strategies (only used if use_nearmiss: true)
  params:
    random_forest:
      n_estimators: 200
      min_samples_leaf: 2
      max_features: "sqrt"
      class_weight: "balanced"
      random_state: 42

    gradient_boosting:
      n_estimators: 200
      learning_rate: 0.1
      max_depth: 3
      min_samples_leaf: 1
      random_state: 42

    xgboost_gpu:
      n_estimators: 500  # More trees for better performance
      max_depth: 8  # Deeper trees
      learning_rate: 0.15  # Faster learning
      tree_method: "hist"  # Modern tree method
      device: "cuda:0"  # GPU acceleration (new API)
      subsample: 0.9  # Slight regularization
      colsample_bytree: 0.9  # Feature sampling
      class_weight: "balanced"  # Handle class imbalance
      random_state: 42

    catboost_gpu:
      iterations: 200  # Optimized for speed
      depth: 6  # Optimized for faster training
      learning_rate: 0.2  # Higher learning rate for fewer iterations
      task_type: "GPU"  # GPU acceleration
      devices: "0"  # Use first GPU
      bootstrap_type: "Bernoulli"  # Better for GPU
      subsample: 0.8  # More aggressive subsampling for speed
      border_count: 128  # Reduced for faster GPU training
      max_ctr_complexity: 1  # Simplified for speed
      gpu_ram_part: 0.8  # Use more GPU memory for performance
      # Note: colsample_bylevel (rsm) not supported in GPU mode for binary classification
      class_weight: "balanced"  # Handle class imbalance
      random_state: 42

    lightgbm_gpu:
      n_estimators: 500  # More estimators
      max_depth: 8  # Deeper trees
      learning_rate: 0.15  # Aggressive learning rate
      device: "gpu"  # GPU acceleration
      gpu_device_id: 0  # Use first GPU
      num_leaves: 255  # Optimized for GPU
      subsample: 0.9  # Regularization
      colsample_bytree: 0.9  # Feature sampling
      class_weight: "balanced"  # Handle class imbalance
      random_state: 42

    svm_rbf:
      kernel: "rbf"
      C: 1.0
      class_weight: "balanced"
      probability: true
      random_state: 42

    svm_linear:
      kernel: "linear"
      C: 1.0
      class_weight: "balanced"
      probability: true
      random_state: 42

    extra_trees:
      n_estimators: 200
      min_samples_leaf: 2
      class_weight: "balanced"
      random_state: 42

    ada_boost:
      n_estimators: 100
      learning_rate: 0.1
      random_state: 42

    knn:
      n_neighbors: 3
      weights: "distance"

    decision_tree:
      min_samples_leaf: 2
      class_weight: "balanced"
      random_state: 42

# Deep learning model configuration
deep_learning:
  pytorch_mlp:
    hidden_layers: [256, 128, 64]
    dropout_rate: 0.3
    weight_decay: 0.001
    learning_rate: 0.001
    batch_size: 128
    epochs: 120
    early_stopping_patience: 15
    batch_norm: true
    activation: "relu"
    optimizer: "adam"
    class_weight: "balanced"
    random_state: 42
    mixed_precision: true
    use_multi_gpu: false

  hybrid_1dcnn_lstm: &hybrid_1dcnn_lstm_base
    cnn_filters: [32, 64, 128]
    cnn_kernel_sizes: [5, 3, 3]
    cnn_pool_sizes: [2, 2, 2]
    cnn_dropout: 0.25
    lstm_units: [64, 32]
    lstm_dropout: 0.25
    lstm_recurrent_dropout: 0.1
    dense_layers: [128, 64]
    dense_dropout: 0.3
    learning_rate: 0.001
    batch_size: 128
    epochs: 120
    early_stopping_patience: 50
    optimizer: "adam"
    class_weight: "balanced"
    random_state: 42
    bidirectional_lstm: true
    attention_mechanism: true
    batch_norm: true
    mixed_precision: true
    gap_before_lstm: false
    weight_decay: 0.001
    gradient_clip_norm: 1.0

  hybrid_1dcnn_lstm_gap:
    <<: *hybrid_1dcnn_lstm_base
    gap_before_lstm: true

  advanced_hybrid_1dcnn_lstm: &advanced_hybrid_1dcnn_lstm_base
    use_cnn: true
    gap_before_lstm: false
    cnn_blocks:
      - filters: [64, 64]
        kernel_sizes: [5, 3]
        pool_size: 2
        dilation_rates: [1, 1]
        separable_conv: false
      - filters: [128, 128]
        kernel_sizes: [3, 3]
        pool_size: 2
        dilation_rates: [1, 1]
        separable_conv: false
      - filters: [256, 128]
        kernel_sizes: [3, 1]
        pool_size: 1
        dilation_rates: [1, 1]
        separable_conv: false
    normalization: "batch_norm"
    cnn_dropout: [0.1, 0.2, 0.3]
    spatial_dropout: true
    gaussian_noise: 0.005
    lstm_architecture:
      - units: 128
        return_sequences: true
        bidirectional: true
        dropout: 0.1
        recurrent_dropout: 0.1
      - units: 64
        return_sequences: false
        bidirectional: true
        dropout: 0.1
        recurrent_dropout: 0.2
    attention_config:
      num_heads: 8
      key_dim: 64
      dropout: 0.1
      use_positional_encoding: true
      attention_type: "multi_head"
    fusion_strategy: "concat"
    feature_pyramid: true
    dense_architecture:
      - units: 256
        activation: "gelu"
        dropout: 0.3
        batch_norm: true
      - units: 128
        activation: "gelu"
        dropout: 0.4
        batch_norm: true
    optimizer_config:
      name: "adamw"
      learning_rate: 0.001
      weight_decay: 0.01
      beta_1: 0.9
      beta_2: 0.999
      epsilon: 1e-7
    lr_schedule:
      type: "cosine_annealing_warm_restarts"
      initial_lr: 0.001
      min_lr: 1e-6
      warmup_epochs: 5
      cycle_length: 20
      cycle_mult: 1
    batch_size: 8192
    epochs: 100
    early_stopping:
      patience: 5
      restore_best_weights: true
      monitor: "val_f1_macro"
      min_delta: 0.001
    augmentation:
      time_warping: false
      magnitude_warping: false
      window_slicing: false
      mixup_alpha: 0.0
      cutmix_alpha: 0.0
    preprocessing:
      sequence_length: 1000
      n_channels: 4
      normalization: "standard_scaler"
      filter_noise: false
      apply_wavelet_denoising: false
    regularization:
      label_smoothing: 0.05
      gradient_clip_norm: 1.0
      ema_decay: 0.999
      stochastic_weight_averaging: false
      dropout_schedule: "constant"
    ensemble:
      num_models: 1
      diversity_loss_weight: 0.0
      uncertainty_estimation: false
      monte_carlo_dropout: false
      test_time_augmentation: false
    loss_config:
      primary_loss: "cross_entropy"
      extra_losses: []
      class_weights: "balanced"
    architecture_enhancements:
      squeeze_excitation: false
      coordinate_attention: false
      ghost_convolutions: false
      inverted_residuals: false
      progressive_resizing: false
    validation:
      cross_validation_folds: 1
      stratified_split: true
      time_series_split: false
    monitoring:
      wandb_logging: false
      tensorboard_logging: false
      model_checkpointing: "best_f1"
      learning_curves: false
      attention_visualization: false
    hardware_optimization:
      mixed_precision: true
      xla_compilation: false
      memory_growth: true
      distribute_strategy: "single_gpu"
    random_state: 10
    deterministic_training: true
    post_training:
      knowledge_distillation: false
      pruning_ratio: 0.0
      quantization: "none"
      onnx_export: false

  advanced_hybrid_1dcnn_lstm_gap:
    <<: *advanced_hybrid_1dcnn_lstm_base
    gap_before_lstm: true

  efficient_tabular_mlp:
    hidden_layers: [256, 128, 64]
    dropout_rate: 0.3
    batch_norm: true
    mixed_precision: true
    class_weight: "balanced"
    random_state: 42
    batch_size: 256
    epochs: 120
    optimizer_config:
      name: "adamw"
      learning_rate: 0.001
      weight_decay: 0.01
      beta_1: 0.9
      beta_2: 0.999
      epsilon: 1e-7
    lr_schedule:
      type: "cosine_annealing_warm_restarts"
      initial_lr: 0.001
      min_lr: 1e-6
      cycle_length: 20
      cycle_mult: 1
    regularization:
      label_smoothing: 0.05
      gradient_clip_norm: 1.0
    early_stopping:
      patience: 100
      restore_best_weights: true
      monitor: "loss"
      min_delta: 0.001

  advanced_lstm:
    use_cnn: false
    gap_before_lstm: false
    normalization: "batch_norm"
    spatial_dropout: false
    gaussian_noise: 0.0
    lstm_architecture:
      - units: 128
        return_sequences: true
        bidirectional: true
        dropout: 0.1
        recurrent_dropout: 0.0
      - units: 64
        return_sequences: false
        bidirectional: true
        dropout: 0.1
        recurrent_dropout: 0.0
    attention_config:
      num_heads: 8
      key_dim: 32
      dropout: 0.1
      use_positional_encoding: false
      attention_type: "multi_head"
    fusion_strategy: "concat"
    feature_pyramid: false
    dense_architecture:
      - units: 256
        activation: "relu"
        dropout: 0.3
        batch_norm: true
      - units: 128
        activation: "relu"
        dropout: 0.4
        batch_norm: true
    optimizer_config:
      name: "adamw"
      learning_rate: 0.001
      weight_decay: 0.01
      beta_1: 0.9
      beta_2: 0.999
      epsilon: 1e-7
    lr_schedule:
      type: "cosine_annealing_warm_restarts"
      initial_lr: 0.001
      min_lr: 1e-6
      cycle_length: 20
      cycle_mult: 1
    batch_size: 128
    epochs: 120
    early_stopping:
      patience: 15
      restore_best_weights: true
      monitor: "loss"
      min_delta: 0.001
    augmentation:
      time_warping: false
      magnitude_warping: false
      window_slicing: false
      mixup_alpha: 0.0
      cutmix_alpha: 0.0
    regularization:
      label_smoothing: 0.05
      gradient_clip_norm: 1.0
    loss_config:
      primary_loss: "cross_entropy"
      extra_losses: []
      class_weights: "balanced"
    hardware_optimization:
      mixed_precision: true
    random_state: 42
    deterministic_training: true

# Paths Configuration
paths:
  models: "models/training_models"
  features: "eeg_analysis/data/processed/features"
  logs: "logs"

# Output Configuration
output:
  save_predictions: true
  save_probabilities: true
  feature_importance: true
  performance_plots: true

# MLflow Tracking
mlflow:
  experiment_name: "paper1"
  tracking_uri: "file:./mlruns"
  register_model: true
  model_stage: "Development"
  artifact_location: "./mlruns"

# Evaluation Metrics
metrics:
  window:
    - accuracy
    - f1
    - roc_auc
  patient:
    - accuracy
    - balanced_accuracy
    - precision
    - recall
    - sensitivity
    - specificity
    - f1
    - roc_auc
    - pr_auc
    - npv
    - mcc

metrics_reporting:
  primary_metric: "roc_auc"
  bootstrap_ci_enabled: true
  bootstrap_ci_level: 0.95
  bootstrap_iterations: 1000
  permutation_test_enabled: true
  permutation_metric: "roc_auc"
  permutation_iterations: 500
  random_seed: 42
  window_auc_enabled: true
  patient_probability_aggregation: "mean_window_probability"
  ranking_stability_top_k: 10
  resampling_stability_enabled: false
  resampling_method: "bootstrap"
  resampling_iterations: 100

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/training_ultra_extreme.log"
  console: true 
